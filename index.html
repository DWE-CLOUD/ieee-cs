<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover"
    />
    <title>IEEE Computer Society - College Tech Club</title>

      name="description"
      content="IEEE Computer Society is the premier technical club at our college. We empower students to innovate, learn, and build cutting-edge technology together."
    />
    <meta name="author" content="IEEE Computer Society" />

    <!-- Mobile optimization -->
    <meta name="theme-color" content="#1a1f2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <link rel="apple-touch-icon" sizes="180x180" href="/pwa-192x192.png" />

    <meta property="og:title" content="IEEE Computer Society - College Tech Club" />

      property="og:description"
      content="The premier technical club empowering students to innovate and build cutting-edge technology together."

    <meta property="og:type" content="website" />
